# Dependabot configuration
#
# Version-update pull requests are disabled here (open-pull-requests-limit: 0).
# Production and user sites receive dependency updates through the Telar
# Compositor (filtered by the Telar team); version bumps are tracked and tested
# on the development instance instead, not opened directly against this repo or
# user repos. Security updates are NOT affected by this limit and still apply.
#
# Version: v1.5.2

version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(pip)"

  # JavaScript dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(npm)"

  # Ruby dependencies (bundler)
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(bundler)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps(actions)"
